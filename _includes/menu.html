{%- if page.name != 'index.md' and page.name != 'Main.md' -%}
<ul class="menu">
  <li>
    {%- if page.prev -%}
    <a href="{{ page.prev }}.html">‹ {{ page.prev }}</a>
    {%- else -%}
    <a href="Main.html">‹ Table of contents</a>
    {%- endif -%}
  </li>
  <li>
    {%- if page.next -%}
    <a href="{{ page.next }}.html">{{ page.next }} ›</a>
    {%- else -%}
    <a href="Main.html">Table of contents ›</a>
    {%- endif -%}
  </li>
</ul>
{%- endif -%}
